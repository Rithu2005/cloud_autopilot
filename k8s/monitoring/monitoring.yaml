apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-service
  namespace: cloud-autopilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitoring-service
  template:
    metadata:
      labels:
        app: monitoring-service
    spec:
      initContainers:
      - name: wait-for-discovery
        image: busybox:1.28
        command: ['sh', '-c', "until nslookup discovery-service.cloud-autopilot.svc.cluster.local; do echo waiting for discovery; sleep 2; done"]
      containers:
      - name: monitoring-service
        image: monitoring-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: autopilot-config
              key: EUREKA_SERVER
        - name: GATEWAY_URL
          valueFrom:
            configMapKeyRef:
              name: autopilot-config
              key: GATEWAY_URL
        - name: ZIPKIN_URL
          valueFrom:
            configMapKeyRef:
              name: autopilot-config
              key: ZIPKIN_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 40
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 40
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-service
  namespace: cloud-autopilot
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8082'
    prometheus.io/path: '/actuator/prometheus'
spec:
  selector:
    app: monitoring-service
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082
