apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cloud-autopilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
      - name: wait-for-discovery
        image: busybox:1.28
        command: ['sh', '-c', "until nslookup discovery-service.cloud-autopilot.svc.cluster.local; do echo waiting for discovery; sleep 2; done"]
      - name: wait-for-redis
        image: busybox:1.28
        command: ['sh', '-c', "until nc -zv redis-service.cloud-autopilot.svc.cluster.local 6379; do echo waiting for redis; sleep 2; done"]
      containers:
      - name: api-gateway
        image: api-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: autopilot-config
              key: EUREKA_SERVER
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: autopilot-secrets
              key: JWT_SECRET
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: autopilot-config
              key: REDIS_HOST
        - name: ZIPKIN_URL
          valueFrom:
            configMapKeyRef:
              name: autopilot-config
              key: ZIPKIN_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: cloud-autopilot
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8080'
    prometheus.io/path: '/actuator/prometheus'
spec:
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: LoadBalancer
