apiVersion: v1
kind: ServiceAccount
metadata:
  name: scaling-service-sa
  namespace: cloud-autopilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scaling-service-role
rules:
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers", "horizontalpodautoscalers/status"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scaling-service-rb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: scaling-service-role
subjects:
- kind: ServiceAccount
  name: scaling-service-sa
  namespace: cloud-autopilot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaling-service
  namespace: cloud-autopilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scaling-service
  template:
    metadata:
      labels:
        app: scaling-service
    spec:
      serviceAccountName: scaling-service-sa
      initContainers:
      - name: wait-for-discovery
        image: busybox:1.28
        command: ['sh', '-c', "until nslookup discovery-service.cloud-autopilot.svc.cluster.local; do echo waiting for discovery; sleep 2; done"]
      containers:
      - name: scaling-service
        image: scaling-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8084
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: autopilot-config
              key: EUREKA_SERVER
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: scaling-service
  namespace: cloud-autopilot
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8084'
    prometheus.io/path: '/actuator/prometheus'
spec:
  selector:
    app: scaling-service
  ports:
  - protocol: TCP
    port: 8084
    targetPort: 8084
