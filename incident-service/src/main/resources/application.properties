server.port=8084
spring.application.name=incident-service

# PostgreSQL Database Persistence
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/autopilot}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


# Eureka Registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Actuator & Monitoring
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

# Resilience4j Config
resilience4j.circuitbreaker.instances.incidentService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.incidentService.slidingWindowSize=10
